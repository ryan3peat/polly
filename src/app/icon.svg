<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="seal" cx="32%" cy="28%" r="72%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#E1C485"/>
      <stop offset="55%"  stop-color="#C4A35A"/>
      <stop offset="100%" stop-color="#9C7E3A"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Rose background (iOS continuous-corner proportions) -->
  <rect width="512" height="512" rx="114" fill="#C9848A"/>

  <!-- Gold wax-seal disc (62% of 512 = 317px diameter) -->
  <circle cx="256" cy="256" r="158" fill="url(#seal)" filter="url(#shadow)"/>

  <!-- Inset dashed ring (6% inset from disc edge) -->
  <circle cx="256" cy="256" r="148"
          fill="none"
          stroke="rgba(255,255,255,0.35)"
          stroke-width="2.5"
          stroke-dasharray="10 5.5"/>

  <!-- Italic P — Cormorant Garamond loaded in browser context -->
  <text x="256" y="256"
        font-family="'Cormorant Garamond', 'Cormorant', Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-weight="500"
        font-size="296"
        fill="#FAF7F4"
        text-anchor="middle"
        dominant-baseline="central"
        dy="0.06em">P</text>
</svg>
